<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#60a5fa" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Globe outer circle -->
  <circle cx="16" cy="16" r="10" stroke="#60a5fa" stroke-width="1.4" fill="none"/>

  <!-- Equator line (faint) -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.35"/>

  <!-- Center meridian ellipse (faint) -->
  <ellipse cx="16" cy="16" rx="4" ry="10" stroke="#a78bfa" stroke-width="0.7" stroke-opacity="0.4" fill="none"/>

  <!-- Pulse / EKG wave through equator -->
  <path d="M6 16 L9.5 16 L11 12.5 L12.5 19.5 L14 16 L16 16 L17.2 13.5 L18.4 18.5 L19.5 16 L22 16"
        stroke="#60a5fa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
