<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Globe outline -->
  <circle cx="12" cy="12" r="9" stroke="#60a5fa" stroke-width="1.3"/>
  <!-- Top latitude arc -->
  <path d="M4.5 8.5 Q12 6 19.5 8.5" stroke="#60a5fa" stroke-width="0.9" stroke-opacity="0.45" fill="none"/>
  <!-- Bottom latitude arc -->
  <path d="M4.5 15.5 Q12 18 19.5 15.5" stroke="#60a5fa" stroke-width="0.9" stroke-opacity="0.45" fill="none"/>
  <!-- Center meridian ellipse -->
  <ellipse cx="12" cy="12" rx="3.5" ry="9" stroke="#a78bfa" stroke-width="0.9" stroke-opacity="0.5"/>
  <!-- Pulse / EKG wave along equator -->
  <path d="M3 12 L6.5 12 L7.8 9.2 L9.2 14.8 L10.5 12 L12 12 L13.2 9.5 L14.5 14.5 L15.6 12 L19 12"
        stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
