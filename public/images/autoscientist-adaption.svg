<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f0f2a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="350" cy="315" rx="320" ry="280" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="900" cy="315" rx="260" ry="220" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- ── Neural Network Diagram (left side) ── -->

  <!-- Layer 1 nodes -->
  <circle cx="120" cy="200" r="18" fill="none" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="120" cy="200" r="10" fill="#60a5fa" fill-opacity="0.4"/>
  <circle cx="120" cy="315" r="18" fill="none" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="120" cy="315" r="10" fill="#60a5fa" fill-opacity="0.4"/>
  <circle cx="120" cy="430" r="18" fill="none" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="120" cy="430" r="10" fill="#60a5fa" fill-opacity="0.4"/>

  <!-- Layer 2 nodes -->
  <circle cx="260" cy="168" r="18" fill="none" stroke="#7cb9fb" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="260" cy="168" r="10" fill="#7cb9fb" fill-opacity="0.4"/>
  <circle cx="260" cy="270" r="18" fill="none" stroke="#7cb9fb" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="260" cy="270" r="10" fill="#7cb9fb" fill-opacity="0.4"/>
  <circle cx="260" cy="372" r="18" fill="none" stroke="#7cb9fb" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="260" cy="372" r="10" fill="#7cb9fb" fill-opacity="0.4"/>
  <circle cx="260" cy="462" r="18" fill="none" stroke="#7cb9fb" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="260" cy="462" r="10" fill="#7cb9fb" fill-opacity="0.4"/>

  <!-- Layer 3 nodes -->
  <circle cx="400" cy="200" r="18" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.8"/>
  <circle cx="400" cy="200" r="10" fill="#a78bfa" fill-opacity="0.5"/>
  <circle cx="400" cy="315" r="18" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.8"/>
  <circle cx="400" cy="315" r="10" fill="#a78bfa" fill-opacity="0.5"/>
  <circle cx="400" cy="430" r="18" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.8"/>
  <circle cx="400" cy="430" r="10" fill="#a78bfa" fill-opacity="0.5"/>

  <!-- Connections Layer 1 → 2 -->
  <g stroke="url(#lineGrad)" stroke-width="1" stroke-opacity="0.25">
    <line x1="138" y1="200" x2="242" y2="168"/>
    <line x1="138" y1="200" x2="242" y2="270"/>
    <line x1="138" y1="200" x2="242" y2="372"/>
    <line x1="138" y1="315" x2="242" y2="168"/>
    <line x1="138" y1="315" x2="242" y2="270"/>
    <line x1="138" y1="315" x2="242" y2="372"/>
    <line x1="138" y1="315" x2="242" y2="462"/>
    <line x1="138" y1="430" x2="242" y2="270"/>
    <line x1="138" y1="430" x2="242" y2="372"/>
    <line x1="138" y1="430" x2="242" y2="462"/>
  </g>

  <!-- Connections Layer 2 → 3 -->
  <g stroke="url(#lineGrad)" stroke-width="1" stroke-opacity="0.25">
    <line x1="278" y1="168" x2="382" y2="200"/>
    <line x1="278" y1="168" x2="382" y2="315"/>
    <line x1="278" y1="270" x2="382" y2="200"/>
    <line x1="278" y1="270" x2="382" y2="315"/>
    <line x1="278" y1="270" x2="382" y2="430"/>
    <line x1="278" y1="372" x2="382" y2="315"/>
    <line x1="278" y1="372" x2="382" y2="430"/>
    <line x1="278" y1="462" x2="382" y2="430"/>
  </g>

  <!-- Self-loop arrow (the "trains itself" concept) -->
  <path d="M 418 200 Q 490 100 490 315 Q 490 500 418 430" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-opacity="0.7" stroke-dasharray="8,4"/>
  <!-- Arrowhead -->
  <polygon points="418,430 408,414 430,418" fill="#60a5fa" fill-opacity="0.7"/>
  <!-- Loop label -->
  <text x="498" y="310" font-family="system-ui,sans-serif" font-size="13" fill="#60a5fa" fill-opacity="0.8" font-weight="600">Self-Train</text>
  <text x="502" y="328" font-family="system-ui,sans-serif" font-size="13" fill="#60a5fa" fill-opacity="0.8" font-weight="600">Loop</text>

  <!-- Divider line -->
  <line x1="570" y1="80" x2="570" y2="550" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ── Right side: Text content ── -->

  <!-- "BREAKING" badge -->
  <rect x="630" y="105" width="110" height="28" rx="14" fill="#60a5fa" fill-opacity="0.15" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="685" y="124" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" font-weight="700" text-anchor="middle" letter-spacing="2">AI NEWS</text>

  <!-- Main headline -->
  <text x="630" y="185" font-family="system-ui,sans-serif" font-size="40" fill="#f8fafc" font-weight="800" letter-spacing="-1">AutoScientist</text>
  <text x="630" y="237" font-family="system-ui,sans-serif" font-size="26" fill="#94a3b8" font-weight="500">by Adaption</text>

  <!-- Divider -->
  <rect x="630" y="258" width="60" height="3" rx="2" fill="url(#nodeGrad)"/>

  <!-- Subtitle -->
  <text x="630" y="300" font-family="system-ui,sans-serif" font-size="18" fill="#cbd5e1" font-weight="400">The AI Tool That Teaches Itself</text>

  <!-- Description text -->
  <text x="630" y="345" font-family="system-ui,sans-serif" font-size="15" fill="#64748b">Adaption's breakthrough platform enables AI models to</text>
  <text x="630" y="368" font-family="system-ui,sans-serif" font-size="15" fill="#64748b">autonomously run experiments, refine training, and</text>
  <text x="630" y="391" font-family="system-ui,sans-serif" font-size="15" fill="#64748b">iterate — dramatically reducing human intervention.</text>

  <!-- Tags -->
  <rect x="630" y="420" width="95" height="28" rx="8" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="677" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" font-weight="600" text-anchor="middle">#AutoML</text>

  <rect x="736" y="420" width="80" height="28" rx="8" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="776" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" font-weight="600" text-anchor="middle">#AI 2025</text>

  <rect x="827" y="420" width="108" height="28" rx="8" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
  <text x="881" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#6ee7b7" font-weight="600" text-anchor="middle">#Self-Training</text>

  <!-- Bottom bar -->
  <rect x="0" y="578" width="1200" height="52" fill="#ffffff" fill-opacity="0.02"/>
  <line x1="0" y1="578" x2="1200" y2="578" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Logo bottom left -->
  <circle cx="52" cy="604" r="14" fill="#60a5fa" fill-opacity="0.2" stroke="#60a5fa" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="52" y="609" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" font-weight="800" text-anchor="middle">TPG</text>
  <text x="80" y="609" font-family="system-ui,sans-serif" font-size="15" fill="#f8fafc" font-weight="700">TechPulse<tspan fill="#60a5fa">Globe</tspan></text>

  <!-- URL bottom right -->
  <text x="1150" y="609" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="end">techpulseglobe.com</text>

  <!-- Decorative dots top right -->
  <g fill="#60a5fa" fill-opacity="0.15">
    <circle cx="1100" cy="80" r="3"/>
    <circle cx="1120" cy="80" r="3"/>
    <circle cx="1140" cy="80" r="3"/>
    <circle cx="1160" cy="80" r="3"/>
    <circle cx="1100" cy="100" r="3"/>
    <circle cx="1120" cy="100" r="3"/>
    <circle cx="1140" cy="100" r="3"/>
    <circle cx="1160" cy="100" r="3"/>
    <circle cx="1100" cy="120" r="3"/>
    <circle cx="1120" cy="120" r="3"/>
    <circle cx="1140" cy="120" r="3"/>
    <circle cx="1160" cy="120" r="3"/>
  </g>
</svg>
